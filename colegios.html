<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegios — Panel Administrativo · Formación Docente</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI', Arial, sans-serif; background:#F1F5F9; color:#0F172A; }
  header {
    background:#0F172A; color:white; padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header h1 { font-size:16px; display:flex; align-items:center; gap:10px; }
  header h1 svg { width:20px; height:20px; flex-shrink:0; }
  header .email { font-size:12px; color:#94A3B8; }
  header a { color:#07B0E4; text-decoration:none; font-size:12.5px; font-weight:600; }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .card { background:white; border-radius:12px; padding:22px; box-shadow:0 2px 8px rgba(0,0,0,.05); margin-bottom:20px; }
  .card h2 { font-size:14px; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  label { display:block; font-size:12px; font-weight:700; color:#334155; margin-bottom:5px; }
  input[type=text], input[type=url] {
    width:100%; padding:10px 12px; border:1.5px solid #E2E8F0; border-radius:8px; font-size:13px; font-family:inherit;
  }
  input[type=color] { width:60px; height:38px; border:1.5px solid #E2E8F0; border-radius:8px; padding:2px; cursor:pointer; }
  .color-row { display:flex; align-items:center; gap:10px; }
  .hint { font-size:11px; color:#94A3B8; margin-top:4px; }
  button.primary {
    padding:11px 20px; border:none; border-radius:8px; background:#07B0E4; color:white;
    font-weight:700; font-size:13px; cursor:pointer; margin-top:16px;
  }
  button.primary:disabled { opacity:.6; cursor:not-allowed; }
  .err { color:#DC2626; font-size:12px; margin-top:10px; }
  .msg { color:#166534; font-size:12px; margin-top:10px; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:10px 12px; text-align:left; font-size:12.5px; border-bottom:1px solid #F1F5F9; }
  th { color:#64748B; font-weight:700; text-transform:uppercase; font-size:10px; letter-spacing:.03em; }
  .swatch { display:inline-block; width:16px; height:16px; border-radius:4px; vertical-align:middle; margin-right:6px; border:1px solid rgba(0,0,0,.1); }
  .badge { padding:3px 9px; border-radius:10px; font-size:10.5px; font-weight:700; }
  .badge.active { background:#DCFCE7; color:#166534; }
  .badge.inactive { background:#FEE2E2; color:#991B1B; }
  button.small {
    padding:5px 10px; border:1.5px solid #E2E8F0; border-radius:6px; background:white;
    font-size:11px; font-weight:600; cursor:pointer; color:#334155; margin-right:6px;
  }
  button.small.hire { background:#07B0E4; border-color:#07B0E4; color:white; }
  .loader, .empty { text-align:center; padding:30px; color:#94A3B8; font-size:13px; }
  .url-link { font-size:11px; color:#07B0E4; text-decoration:none; }
</style>
</head>
<body>
  <header>
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 21V9l8-5 8 5v12"/><path d="M4 21h16"/><path d="M9 21v-6h6v6"/><path d="M9 12h.01M15 12h.01M9 9h.01M15 9h.01"/>
      </svg>
      Colegios
    </h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="email" id="adminEmail"></span>
      <a href="admin.html">← Panel Administrativo</a>
    </div>
  </header>
  <main>
    <div class="card">
      <h2>Nuevo colegio</h2>
      <form id="form">
        <div class="grid">
          <div>
            <label for="name">Nombre del colegio</label>
            <input type="text" id="name" required maxlength="100" placeholder="Colegio VDF">
          </div>
          <div>
            <label for="slug">Slug (parte de la URL)</label>
            <input type="text" id="slug" required maxlength="40" placeholder="vdf" pattern="[a-z0-9\-]+">
            <p class="hint">yoaprendo.online/<span id="slugPreview">slug</span>/postulacion.html</p>
          </div>
        </div>
        <div class="grid" style="margin-top:14px">
          <div>
            <label for="program_name">Nombre del programa</label>
            <input type="text" id="program_name" maxlength="100" placeholder="Programa STEEAM VDF">
          </div>
          <div>
            <label>Colores de marca</label>
            <div class="color-row">
              <input type="color" id="primary_color" value="#07B0E4" title="Color primario">
              <input type="color" id="secondary_color" value="#07B0E4" title="Color secundario">
              <input type="color" id="tertiary_color" value="#07B0E4" title="Color terciario">
              <span class="hint">primario / secundario / terciario</span>
            </div>
          </div>
        </div>
        <div style="margin-top:14px">
          <label for="logo_url">URL del logo (opcional)</label>
          <input type="url" id="logo_url" placeholder="https://...">
        </div>
        <button type="submit" class="primary" id="submitBtn">Crear colegio</button>
        <p class="err" id="errMsg"></p>
        <p class="msg" id="okMsg"></p>
      </form>
    </div>

    <div class="card">
      <h2>Colegios existentes</h2>
      <div id="tableWrap"><div class="loader">Cargando…</div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="colegios.js"></script>
</body>
</html>
