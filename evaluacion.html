<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación de Casos — Facilitador STEEAM</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Segoe UI', Arial, sans-serif;
    background:#0F172A;
    min-height:100vh;
    padding:2rem 1.5rem;
  }
  .card {
    background:white;
    border-radius:20px;
    max-width:620px;
    width:100%;
    margin:0 auto;
    padding:32px 28px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
  }
  .icon { font-size:42px; text-align:center; margin-bottom:8px; }
  h1 { font-size:19px; text-align:center; color:#0F172A; margin-bottom:4px; }
  .sub { font-size:12.5px; text-align:center; color:#94A3B8; margin-bottom:24px; }
  .case { margin-bottom:22px; padding:16px; background:#F8FAFC; border-radius:12px; border-left:4px solid #07B0E4; }
  .case h3 { font-size:13.5px; color:#0F172A; margin-bottom:8px; }
  .case p { font-size:13px; color:#475569; line-height:1.5; margin-bottom:10px; }
  textarea {
    width:100%; min-height:90px; padding:11px 13px; border:1.5px solid #E2E8F0; border-radius:10px;
    font-size:13.5px; font-family:inherit; resize:vertical;
  }
  button { width:100%; padding:13px; border:none; border-radius:10px; background:#07B0E4; color:white; font-weight:700; font-size:14px; cursor:pointer; margin-top:10px; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  button.secondary { background:#E2E8F0; color:#334155; }
  .err { color:#DC2626; font-size:12px; margin-top:10px; text-align:center; min-height:16px; }
  .status { padding:14px; border-radius:12px; text-align:center; font-weight:800; font-size:14px; margin-bottom:16px; }
  .status.valid { background:#DCFCE7; color:#166534; }
  .status.invalid { background:#FEE2E2; color:#991B1B; }
  .score-row { display:flex; gap:12px; margin-bottom:16px; }
  .score-box { flex:1; text-align:center; padding:16px 10px; background:#F8FAFC; border-radius:12px; }
  .score-box .num { font-size:26px; font-weight:800; color:#07B0E4; }
  .score-box .lbl { font-size:11px; color:#64748B; margin-top:2px; }
  .feedback { font-size:13px; color:#334155; line-height:1.6; margin-bottom:14px; padding:14px; background:#F8FAFC; border-radius:10px; }
  .feedback strong { color:#0F172A; }
  .roadmap { margin:14px 0; }
  .roadmap-item { padding:10px 14px; background:#EFF6FF; border-radius:10px; margin-bottom:8px; font-size:12.5px; color:#1E3A8A; }
  .footer { text-align:center; font-size:11px; color:#CBD5E1; margin-top:20px; }
  .loader { text-align:center; color:#94A3B8; font-size:13px; padding:30px 0; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="loader" id="loader">Cargando...</div>
  </div>

  <script>
    const EVALUATE_CANDIDATE_URL = 'https://grkjhzkgcmackbafqudu.supabase.co/functions/v1/evaluate-candidate';
    // El gateway de Supabase exige un JWT válido en Authorization antes de
    // que corra el código de la función, aunque la función misma no lo
    // valide (el candidato se identifica con access_token, no con JWT).
    // El anon key es un JWT válido y satisface ese chequeo de plataforma.
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdya2poemtnY21hY2tiYWZxdWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjg5MzQsImV4cCI6MjA5NjcwNDkzNH0.2nVTRlhey6HkGs_KZxtCaEp8L2QrvD0NUwY8ZFwZVHY";

    // Casos de estudio del proceso de selección — uno por ruta de formación
    // (steam20 / convivencia / ia / creativo / metodologias) para que la IA
    // tenga señal clara de en qué ruta ubicar al candidato si continúa.
    const CASES = [
      {
        id: 'caso1',
        title: 'Caso 1 · Metodología STEAM y pensamiento de proyecto',
        prompt: 'Tu grupo de 5º primaria arma un robot con el kit 1bot para resolver el reto "sacar la pelota del laberinto". Después de tres intentos fallidos, un subgrupo quiere abandonar y otro insiste en copiar el código de otro equipo en vez de seguir probando. No puedes darles la solución directa — es una evaluación del programa STEAM. ¿Cómo conduces la sesión para que ambos subgrupos sigan el ciclo de "diseñar → probar → mejorar" sin perder la motivación ni saltarse el proceso?'
      },
      {
        id: 'caso2',
        title: 'Caso 2 · Manejo de aula y convivencia',
        prompt: 'Durante la actividad de robótica, dos estudiantes empiezan a discutir fuerte por quién controla el mando — uno le arrebata el robot al otro frente al resto del grupo y la tensión sube. El resto de la clase se distrae y algunos empiezan a grabar con el celular. Tienes que resolver el conflicto, retomar el control del grupo y continuar la actividad en los siguientes 5 minutos. ¿Qué haces, en qué orden, y qué le dices a cada estudiante involucrado?'
      },
      {
        id: 'caso3',
        title: 'Caso 3 · Herramientas de inteligencia artificial en el aula',
        prompt: 'Tienes que preparar en dos días una clase sobre "qué es la inteligencia artificial" para estudiantes de 6º primaria que nunca han tocado el tema, sin acceso a internet dentro del salón. ¿Qué herramientas de IA usarías FUERA del aula para preparar el material (actividades, ejemplos, imágenes), y cómo explicarías el concepto de IA de forma simple y sin tecnicismos dentro del salón, sin conexión?'
      },
      {
        id: 'caso4',
        title: 'Caso 4 · Creatividad con recursos limitados',
        prompt: 'Tienes 40 minutos de clase, solo 5 kits de robótica y 25 estudiantes — no alcanza un kit por persona ni por pareja. Algunos estudiantes ya saben usar el kit de clases anteriores y otros nunca lo han tocado. ¿Cómo organizas la actividad de forma creativa para que los 25 participen activamente (no solo los 5 que tienen el kit en la mano), aprovechando la diferencia de experiencia entre ellos en vez de que sea un obstáculo?'
      },
      {
        id: 'caso5',
        title: 'Caso 5 · Comunicación con la comunidad educativa',
        prompt: 'Un padre de familia te aborda a la salida y te dice, molesto, que su hijo "solo juega con robots" en tu clase y que eso no le va a servir para nada en la vida real — quiere que en vez de eso le enseñes matemática "de verdad". Tienes menos de 3 minutos porque él tiene prisa. ¿Qué le respondes para que entienda el valor real de la metodología STEAM sin sonar a discurso memorizado, y qué harías después con ese padre a mediano plazo?'
      },
    ];

    function escapeHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderNoToken() {
      document.getElementById('card').innerHTML = `
        <div class="icon">🔒</div>
        <div class="status invalid">Enlace inválido</div>
        <p class="sub" style="margin-bottom:20px">Este enlace de evaluación no es válido o ya fue utilizado. Si crees que esto es un error, contacta al equipo de reclutamiento.</p>`;
    }

    function renderForm(token) {
      const casesHtml = CASES.map(c => `
        <div class="case">
          <h3>${escapeHtml(c.title)}</h3>
          <p>${escapeHtml(c.prompt)}</p>
          <textarea id="answer_${c.id}" maxlength="2000" placeholder="Escribe tu respuesta aquí..."></textarea>
        </div>
      `).join('');

      document.getElementById('card').innerHTML = `
        <div class="icon">📝</div>
        <h1>Evaluación de casos de estudio</h1>
        <p class="sub">Responde con tus propias palabras — no hay una única respuesta correcta, queremos conocer tu forma de pensar.</p>
        ${casesHtml}
        <button id="submitBtn">Enviar evaluación</button>
        <p class="err" id="errMsg"></p>
        <p class="footer">Programa STEEAM · 1bot · Guatemala</p>
      `;

      document.getElementById('submitBtn').addEventListener('click', () => submitEvaluation(token));
    }

    async function submitEvaluation(token) {
      const errMsg = document.getElementById('errMsg');
      const submitBtn = document.getElementById('submitBtn');
      errMsg.textContent = '';

      const responses = CASES.map(c => ({
        case_id: c.id,
        answer_text: document.getElementById('answer_' + c.id).value.trim(),
      }));

      const empty = responses.filter(r => r.answer_text.length < 5);
      if (empty.length > 0) {
        errMsg.textContent = 'Responde todos los casos antes de enviar.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Evaluando... esto puede tardar unos segundos';

      try {
        const res = await fetch(EVALUATE_CANDIDATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
          body: JSON.stringify({ access_token: token, responses }),
        });
        const data = await res.json();

        if (!res.ok) {
          errMsg.textContent = data.error || 'Ocurrió un error al evaluar. Intenta de nuevo.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Enviar evaluación';
          return;
        }

        renderResult(token, data);
      } catch (networkErr) {
        errMsg.textContent = 'No se pudo conectar. Verifica tu conexión e intenta de nuevo.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enviar evaluación';
      }
    }

    function renderResult(token, data) {
      const roadmapHtml = (data.recommended_paths || []).map(p => `
        <div class="roadmap-item">📚 <strong>${escapeHtml(p.label)}</strong></div>
      `).join('') || '<div class="roadmap-item">No se identificaron áreas débiles específicas — buen desempeño general.</div>';

      document.getElementById('card').innerHTML = `
        <div class="icon">${data.passed ? '🎉' : '📊'}</div>
        <div class="status ${data.passed ? 'valid' : 'invalid'}">${data.passed ? '¡Buen resultado!' : 'Resultado obtenido'}</div>
        <div class="score-row">
          <div class="score-box"><div class="num">${data.technical_score}</div><div class="lbl">Técnica</div></div>
          <div class="score-box"><div class="num">${data.soft_score}</div><div class="lbl">Habilidades blandas</div></div>
          <div class="score-box"><div class="num">${data.overall_score}</div><div class="lbl">General</div></div>
        </div>
        <div class="feedback">
          <strong>Técnica:</strong> ${escapeHtml(data.feedback?.technical || '')}<br><br>
          <strong>Blandas:</strong> ${escapeHtml(data.feedback?.soft || '')}<br><br>
          <strong>Resumen:</strong> ${escapeHtml(data.feedback?.summary || '')}
        </div>
        <h3 style="font-size:13px;color:#0F172A;margin-bottom:8px;">Ruta de formación sugerida si continúas</h3>
        <div class="roadmap">${roadmapHtml}</div>
        <p class="sub" style="margin:16px 0 8px;">Con base en tu puntaje, tú decides si deseas continuar en el proceso de selección.</p>
        <button id="continuarBtn">Deseo continuar el proceso</button>
        <button id="retirarBtn" class="secondary">Ya no deseo continuar</button>
        <p class="err" id="errMsg2"></p>
        <p class="footer">Programa STEEAM · 1bot · Guatemala</p>
      `;

      document.getElementById('continuarBtn').addEventListener('click', () => submitDecision(token, 'continuar'));
      document.getElementById('retirarBtn').addEventListener('click', () => submitDecision(token, 'retirar'));
    }

    async function submitDecision(token, decision) {
      const errMsg2 = document.getElementById('errMsg2');
      errMsg2.textContent = '';
      try {
        const res = await fetch(EVALUATE_CANDIDATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
          body: JSON.stringify({ access_token: token, decision }),
        });
        const data = await res.json();
        if (!res.ok) { errMsg2.textContent = data.error || 'Error al registrar tu decisión.'; return; }

        document.getElementById('card').innerHTML = `
          <div class="icon">${decision === 'continuar' ? '✅' : '👋'}</div>
          <div class="status valid">Decisión registrada</div>
          <p class="sub" style="margin-bottom:20px">${decision === 'continuar'
            ? 'Gracias por continuar en el proceso. El equipo de reclutamiento revisará tu evaluación y se pondrá en contacto contigo.'
            : 'Gracias por tu tiempo. Te deseamos éxito en tu búsqueda.'}</p>
          <p class="footer">Programa STEEAM · 1bot · Guatemala</p>`;
      } catch (networkErr) {
        errMsg2.textContent = 'No se pudo conectar. Intenta de nuevo.';
      }
    }

    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    if (!token) renderNoToken(); else renderForm(token);
  </script>
</body>
</html>
