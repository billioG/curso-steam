<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compendio de Formación Docente · 1bot - edoo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;font-size:14px;line-height:1.6}
.no-print{position:fixed;top:16px;right:16px;z-index:999;display:flex;gap:8px}
.no-print button{background:#4f46e5;color:white;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-weight:600;font-size:13px;box-shadow:0 2px 8px rgba(79,70,229,.3)}
.no-print button:hover{background:#4338ca}
.no-print a{background:white;color:#64748b;border:1px solid #e2e8f0;border-radius:8px;padding:10px 18px;cursor:pointer;font-weight:600;font-size:13px;text-decoration:none;display:flex;align-items:center}

/* Cover */
.cover{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#1A6B68 0%,#0d4f4c 100%);color:white;padding:60px 40px;page-break-after:always}
.cover-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:6px 16px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px}
.cover h1{font-size:36px;font-weight:800;margin-bottom:12px;line-height:1.2}
.cover h2{font-size:18px;font-weight:400;opacity:.8;margin-bottom:32px}
.cover-stats{display:flex;gap:32px;margin-bottom:40px}
.stat{background:rgba(255,255,255,.1);border-radius:12px;padding:16px 24px;text-align:center}
.stat-n{font-size:28px;font-weight:800}
.stat-l{font-size:11px;opacity:.7;margin-top:2px}
.cover-brand{font-size:13px;opacity:.6;margin-top:auto;padding-top:32px;border-top:1px solid rgba(255,255,255,.2);width:100%;text-align:center}

/* TOC */
.toc{background:rgba(255,255,255,.1);border-radius:16px;padding:24px 32px;text-align:left;width:100%;max-width:480px;margin:0 auto 32px}
.toc h3{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.6;margin-bottom:16px}
.toc-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.toc-item:last-child{border-bottom:none}
.toc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.toc-title{font-size:14px;font-weight:600}
.toc-meta{font-size:11px;opacity:.6;margin-left:auto}

/* Course section */
.course-section{page-break-before:always}
.course-header{padding:40px;color:white;position:relative;overflow:hidden}
.course-header::after{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08)}
.course-tag{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:12px}
.course-header h1{font-size:28px;font-weight:800;margin-bottom:6px;position:relative}
.course-header p{font-size:14px;opacity:.85;position:relative}
.course-meta{display:flex;gap:20px;margin-top:20px;position:relative}
.course-meta-item{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600}

/* Module */
.module{padding:32px 40px;border-bottom:2px solid #f1f5f9}
.module:last-child{border-bottom:none}
.module-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;gap:8px}
.module-number{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;flex-shrink:0}

/* Content card */
.content-card{margin-bottom:20px;background:white;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
.content-card-header{padding:14px 18px;background:#f8fafc;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:8px}
.content-card-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;flex-shrink:0}
.content-card-body{padding:14px 18px}
.content-card-body p{color:#334155;line-height:1.7}
.tip-box{margin-top:12px;background:#fffbeb;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:0 8px 8px 0;font-size:12px;color:#92400e}
.tip-label{font-weight:700;margin-bottom:2px}

/* Quiz card */
.quiz-card{margin-bottom:20px;background:white;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
.quiz-card-header{padding:14px 18px;background:#f0f9ff;border-bottom:1px solid #bae6fd;font-size:13px;font-weight:700;color:#0369a1;display:flex;align-items:center;gap:8px}
.quiz-badge{background:#0369a1;color:white;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.quiz-question{padding:14px 18px 0;font-size:13px;font-weight:600;color:#1e293b}
.quiz-options{padding:12px 18px;display:flex;flex-direction:column;gap:6px}
.quiz-option{padding:8px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px;display:flex;align-items:center;gap:8px;color:#475569}
.quiz-option.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;font-weight:600}
.correct-mark{width:18px;height:18px;border-radius:50%;background:#16a34a;color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wrong-mark{width:18px;height:18px;border-radius:50%;background:#e2e8f0;color:#94a3b8;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.explanation{margin:0 18px 14px;background:#f8fafc;border-radius:8px;padding:10px 14px;font-size:12px;color:#475569;border-left:3px solid #0369a1}
.explanation-label{font-weight:700;color:#0369a1;margin-bottom:2px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}

/* Diagnostic */
.diag-section{padding:32px 40px;page-break-before:always}
.diag-title{font-size:22px;font-weight:800;margin-bottom:6px}
.diag-subtitle{color:#64748b;margin-bottom:24px}
.diag-domain{margin-bottom:28px}
.diag-domain-header{background:#1A6B68;color:white;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;margin-bottom:12px}
.diag-q{background:white;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden}
.diag-q-text{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #f1f5f9}
.diag-q-options{padding:10px 16px;display:flex;flex-direction:column;gap:4px}
.diag-q-opt{font-size:12px;padding:5px 10px;border-radius:6px;color:#475569;display:flex;align-items:center;gap:6px}
.diag-q-opt.correct{background:#f0fdf4;color:#15803d;font-weight:600}

/* Footer */
.page-footer{text-align:center;padding:24px 40px;background:#f8fafc;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:11px}

/* Loading state */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:#64748b}
.spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media print{
  .no-print{display:none!important}
  body{background:white}
  .course-section,.diag-section{page-break-before:always}
  .content-card,.quiz-card,.diag-q{break-inside:avoid}
  .module{break-inside:avoid}
}
</style>
</head>
<body>

<div class="no-print">
  <a href="../index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><polyline points="15 18 9 12 15 6"/></svg>
    Volver
  </a>
  <button onclick="window.print()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Imprimir / Guardar PDF
  </button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando contenido de todos los cursos…</p>
</div>

<div id="output" style="display:none"></div>

<script src="../data.js"></script>
<script src="../diagnostico.js"></script>
<script>
const COURSE_ORDER = ['design-thinking','tipos-estudiantes','abp','steam','evaluacion','storytelling'];
const COURSE_COLORS = {
  'steam':'#07B0E4','abp':'#2BA848','design-thinking':'#E83C8D',
  'evaluacion':'#E9A037','tipos-estudiantes':'#7C3AED','storytelling':'#F59E0B'
};
const DOMAIN_LABELS = {
  steam:'Metodología STEAM',abp:'Aprendizaje Basado en Proyectos',
  dt:'Design Thinking',eval:'Evaluación Formativa',tipos:'Conoce a Quien Enseñas'
};

function stripEmoji(str){
  if(!str)return'';
  return str.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,'').trim();
}

function esc(str){
  if(!str)return'';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderContent(card, idx, color){
  const tip = typeof card.extra==='object' ? (card.extra?.tip||'') : (card.extra||'');
  return `
  <div class="content-card">
    <div class="content-card-header">
      <div class="content-card-num" style="background:${color}">${idx}</div>
      ${esc(stripEmoji(card.title))}
    </div>
    <div class="content-card-body">
      <p>${esc(card.content||'')}</p>
      ${tip?`<div class="tip-box"><div class="tip-label">Dato clave</div>${esc(tip)}</div>`:''}
    </div>
  </div>`;
}

function renderQuiz(card, idx){
  const opts = (card.options||[]).map((o,i)=>{
    const isCorrect = i===card.correct;
    const mark = isCorrect
      ? `<div class="correct-mark"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`
      : `<div class="wrong-mark">${String.fromCharCode(65+i)}</div>`;
    return `<div class="quiz-option${isCorrect?' correct':''}">${mark}${esc(o)}</div>`;
  }).join('');
  return `
  <div class="quiz-card">
    <div class="quiz-card-header">
      <span class="quiz-badge">Quiz</span>
      Pregunta ${idx}
    </div>
    <div class="quiz-question">${esc(card.question||card.title||'')}</div>
    <div class="quiz-options">${opts}</div>
    ${card.explanation?`<div class="explanation"><div class="explanation-label">Explicación</div>${esc(card.explanation)}</div>`:''}
  </div>`;
}

function renderDiag(){
  if(typeof DIAG_QUESTIONS==='undefined')return'';
  const byDomain={};
  DIAG_QUESTIONS.forEach(q=>{
    const d=q.domain||'general';
    if(!byDomain[d])byDomain[d]=[];
    byDomain[d].push(q);
  });
  const domains = Object.keys(byDomain);
  let html=`<div class="diag-section">
    <h2 class="diag-title">Examen Diagnóstico</h2>
    <p class="diag-subtitle">Preguntas del diagnóstico pedagógico inicial — respuesta correcta marcada en verde</p>`;
  domains.forEach(d=>{
    const label=DOMAIN_LABELS[d]||d;
    html+=`<div class="diag-domain">
      <div class="diag-domain-header">${esc(label)}</div>`;
    byDomain[d].forEach((q,qi)=>{
      const opts=(q.options||[]).map((o,i)=>{
        const correct=i===q.correct;
        return `<div class="diag-q-opt${correct?' correct':''}">${correct?'✓':String.fromCharCode(65+i)+'.'} ${esc(o)}</div>`;
      }).join('');
      html+=`<div class="diag-q">
        <div class="diag-q-text">${qi+1}. ${esc(q.question)}</div>
        <div class="diag-q-options">${opts}</div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function build(){
  if(typeof allCourses==='undefined'){
    document.getElementById('loading').innerHTML='<p style="color:#ef4444">Error: no se pudo cargar data.js</p>';
    return;
  }

  const ordered = COURSE_ORDER.map(id=>allCourses.find(c=>c.id===id)).filter(Boolean)
    .concat(allCourses.filter(c=>!COURSE_ORDER.includes(c.id)));

  // Counts
  let totalCards=0, totalQuizzes=0;
  ordered.forEach(c=>(c.modules||[]).forEach(m=>(m.cards||[]).forEach(card=>{
    totalCards++;
    if(card.type==='quiz')totalQuizzes++;
  })));

  // Cover
  const tocItems = ordered.map(c=>`
    <div class="toc-item">
      <div class="toc-dot" style="background:${COURSE_COLORS[c.id]||'#4f46e5'}"></div>
      <span class="toc-title">${esc(stripEmoji(c.title))}</span>
      <span class="toc-meta">${(c.modules||[]).length} módulos · ${c.totalCards||0} tarjetas</span>
    </div>`).join('');

  let html=`
  <div class="cover">
    <div class="cover-badge">1bot - edoo · Guatemala 2026</div>
    <h1>Compendio de Formación Docente</h1>
    <h2>Pedagogía Innovadora para el Siglo XXI</h2>
    <div class="cover-stats">
      <div class="stat"><div class="stat-n">${ordered.length}</div><div class="stat-l">cursos</div></div>
      <div class="stat"><div class="stat-n">${totalCards}</div><div class="stat-l">tarjetas</div></div>
      <div class="stat"><div class="stat-n">${totalQuizzes}</div><div class="stat-l">evaluaciones</div></div>
    </div>
    <div class="toc"><h3>Contenido</h3>${tocItems}</div>
    <div class="cover-brand">Formación Docente en Pedagogía Innovadora · Todos los derechos reservados</div>
  </div>`;

  // Courses
  ordered.forEach(course=>{
    const color = COURSE_COLORS[course.id]||'#4f46e5';
    let contentCards=0, quizCards=0;
    (course.modules||[]).forEach(m=>(m.cards||[]).forEach(c=>{
      if(c.type==='quiz')quizCards++;else contentCards++;
    }));

    html+=`<div class="course-section">
      <div class="course-header" style="background:${color}">
        <div class="course-tag">Curso</div>
        <h1>${esc(stripEmoji(course.title))}</h1>
        <p>${esc(stripEmoji(course.subtitle||''))}</p>
        <div class="course-meta">
          <div class="course-meta-item">${course.durationHours||0} horas</div>
          <div class="course-meta-item">${(course.modules||[]).length} módulos</div>
          <div class="course-meta-item">${contentCards} contenidos</div>
          <div class="course-meta-item">${quizCards} evaluaciones</div>
        </div>
      </div>`;

    let globalCardNum=0;
    (course.modules||[]).forEach((mod,mi)=>{
      let contentNum=0, quizNum=0;
      html+=`<div class="module">
        <div class="module-title">
          <div class="module-number" style="background:${color}">${mi+1}</div>
          ${esc(stripEmoji(mod.title||''))}
        </div>`;
      (mod.cards||[]).forEach(card=>{
        globalCardNum++;
        if(card.type==='quiz'){
          quizNum++;
          html+=renderQuiz(card,quizNum);
        } else {
          contentNum++;
          html+=renderContent(card,contentNum,color);
        }
      });
      html+='</div>';
    });

    html+=`</div>`;
  });

  // Diagnostic
  html+=renderDiag();

  // Footer
  html+=`<div class="page-footer">1bot - edoo · Guatemala 2026 · Todos los derechos reservados · Compendio de Formación Docente en Pedagogía Innovadora</div>`;

  document.getElementById('loading').style.display='none';
  const out=document.getElementById('output');
  out.style.display='block';
  out.innerHTML=html;
}

// Wait for both scripts to load
document.addEventListener('DOMContentLoaded', build);
</script>
</body>
</html>
