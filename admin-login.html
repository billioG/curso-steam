<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Curso STEAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-900 to-purple-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-8 shadow-2xl">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3">🔐</div>
            <h1 class="text-2xl font-bold text-indigo-800">Acceso Administrador</h1>
            <p class="text-gray-500 text-sm">Curso STEAM - Profe Billy</p>
        </div>
        <input type="email" id="adminEmail" placeholder="Email" class="w-full border border-gray-300 rounded-xl p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <input type="password" id="adminPassword" placeholder="Contraseña" class="w-full border border-gray-300 rounded-xl p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <button id="adminLoginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition">Iniciar Sesión</button>
        <div id="errorMsg" class="text-red-500 text-center mt-4 hidden"></div>
        <div class="mt-6 text-center text-xs text-gray-400">
            <i class="fas fa-shield-alt"></i> Solo personal autorizado
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://grkjhzkgcmackbafqudu.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdya2poemtnY21hY2tiYWZxdWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjg5MzQsImV4cCI6MjA5NjcwNDkzNH0.2nVTRlhey6HkGs_KZxtCaEp8L2QrvD0NUwY8ZFwZVHY";
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function doLogin() {
            const email    = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btn      = document.getElementById('adminLoginBtn');
            const errEl    = document.getElementById('errorMsg');
            if (!email || !password) { errEl.innerText='Completa email y contraseña.'; errEl.classList.remove('hidden'); return; }
            btn.disabled = true; btn.textContent = 'Ingresando…';
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            btn.disabled = false; btn.textContent = 'Iniciar Sesión';
            if (error) {
                errEl.innerText = error.message === 'Invalid login credentials'
                    ? 'Credenciales incorrectas. Verifica tu email y contraseña.'
                    : error.message;
                errEl.classList.remove('hidden');
            } else {
                window.location.href = 'admin.html';
            }
        }
        document.getElementById('adminLoginBtn').addEventListener('click', doLogin);
        document.getElementById('adminPassword').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
        document.getElementById('adminEmail').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('adminPassword').focus(); });
    </script>
</body>
</html>
