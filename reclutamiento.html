<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reclutamiento — Panel Administrativo · Formación Docente</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI', Arial, sans-serif; background:#F1F5F9; color:#0F172A; }
  header {
    background:#0F172A; color:white; padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header h1 { font-size:16px; display:flex; align-items:center; gap:8px; }
  header h1 svg { width:18px; height:18px; flex-shrink:0; }
  .tenant-logo { width:32px; height:32px; border-radius:8px; object-fit:cover; flex-shrink:0; }
  header .email { font-size:12px; color:#94A3B8; }
  header a { color:var(--brand-primary,#07B0E4); text-decoration:none; font-size:12.5px; font-weight:600; }
  header .tenant-badge { font-weight:700; font-size:12.5px; color:var(--brand-primary,#07B0E4); background:rgba(255,255,255,.08); padding:4px 10px; border-radius:20px; }
  header .tenant-badge:empty { display:none; }
  main { max-width:1100px; margin:0 auto; padding:24px; }
  .filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .filters button {
    padding:7px 14px; border-radius:20px; border:1.5px solid #E2E8F0; background:white;
    font-size:12px; font-weight:600; color:#475569; cursor:pointer;
  }
  .filters button.active { background:var(--brand-primary,#07B0E4); color:white; border-color:var(--brand-primary,#07B0E4); }
  table { width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.05); }
  th, td { padding:12px 14px; text-align:left; font-size:12.5px; border-bottom:1px solid #F1F5F9; }
  th { background:#F8FAFC; color:#64748B; font-weight:700; text-transform:uppercase; font-size:10.5px; letter-spacing:.03em; }
  td.name { font-weight:700; }
  .badge { padding:4px 10px; border-radius:12px; font-size:10.5px; font-weight:700; display:inline-block; }
  .badge.aplicado, .badge.evaluacion_pendiente { background:#FEF3C7; color:#92400E; }
  .badge.rechazado_filtro, .badge.rechazado, .badge.desertado { background:#FEE2E2; color:#991B1B; }
  .badge.evaluado { background:#DBEAFE; color:#1E40AF; }
  .badge.contratado { background:#DCFCE7; color:#166534; }
  .score { font-weight:800; color:var(--brand-primary,#07B0E4); }
  button.hire { padding:6px 12px; border:none; border-radius:8px; background:var(--brand-primary,#07B0E4); color:white; font-weight:700; font-size:11.5px; cursor:pointer; }
  button.hire:disabled { opacity:.5; cursor:not-allowed; }
  .loader, .empty { text-align:center; padding:40px; color:#94A3B8; font-size:13px; }
  .weak { font-size:11px; color:#64748B; }
  tr.candidate-row { cursor:pointer; }
  tr.candidate-row:hover { background:#F8FAFC; }
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(15,23,42,.55);
    align-items:center; justify-content:center; padding:20px; z-index:100;
  }
  .modal-card {
    background:white; border-radius:16px; max-width:520px; width:100%;
    max-height:85vh; overflow-y:auto; padding:28px; position:relative;
  }
  .modal-close {
    position:absolute; top:16px; right:16px; border:none; background:#F1F5F9;
    width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:14px; color:#64748B;
  }
  .modal-card h2 { font-size:17px; margin-bottom:6px; }
  .modal-card .sub { font-size:12px; color:#64748B; margin-bottom:18px; }
  .score-row { display:flex; gap:10px; margin-bottom:14px; }
  .score-box { flex:1; text-align:center; padding:14px 8px; background:#F8FAFC; border-radius:10px; }
  .score-box .num { font-size:22px; font-weight:800; color:var(--brand-primary,#07B0E4); }
  .score-box .lbl { font-size:10.5px; color:#64748B; margin-top:2px; }
  .feedback { font-size:12.5px; color:#334155; line-height:1.6; padding:12px; background:#F8FAFC; border-radius:10px; margin-bottom:8px; }
  .roadmap-item { display:flex; align-items:center; gap:6px; padding:8px 12px; background:color-mix(in srgb, var(--brand-tertiary,#07B0E4) 10%, #F8FAFC); border-radius:8px; margin-bottom:6px; font-size:12px; color:#1E3A8A; }
</style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <img class="tenant-logo" data-tenant="logo" src="default-logo.svg" alt="Logo">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
        Reclutamiento Docente
      </h1>
      <span class="tenant-badge" id="tenantBadge" data-tenant="name"></span>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="email" id="adminEmail"></span>
      <a href="admin.html" id="adminHomeLink">← Panel Administrativo</a>
    </div>
  </header>
  <main>
    <div class="filters" id="filters">
      <button data-status="all" class="active">Todos</button>
      <button data-status="evaluacion_pendiente">Pendientes</button>
      <button data-status="evaluado">Evaluados</button>
      <button data-status="contratado">Contratados</button>
      <button data-status="rechazado_filtro">Rechazados (filtro)</button>
      <button data-status="desertado">Desertaron</button>
    </div>
    <div id="tableWrap"><div class="loader">Cargando candidatos…</div></div>
  </main>

  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeDetail()">
    <div class="modal-card">
      <button class="modal-close" onclick="closeDetail()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="tenant.js"></script>
  <script src="reclutamiento.js"></script>
</body>
</html>
