<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#07B0E4"/>
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A6B68"/>
      <stop offset="100%" style="stop-color:#07B0E4"/>
    </linearGradient>
  </defs>
  <!-- Letra S -->
  <text x="68" y="340" font-family="Arial Black,Arial" font-weight="900" font-size="148" fill="#FCC30A">S</text>
  <!-- Letra T -->
  <text x="168" y="340" font-family="Arial Black,Arial" font-weight="900" font-size="148" fill="#2BA848">T</text>
  <!-- Letra E -->
  <text x="258" y="340" font-family="Arial Black,Arial" font-weight="900" font-size="148" fill="#07B0E4" stroke="white" stroke-width="4">E</text>
  <!-- Línea inferior decorativa -->
  <rect x="68" y="360" width="376" height="14" rx="7" fill="white" opacity="0.35"/>
  <!-- Línea superior -->
  <rect x="68" y="148" width="376" height="10" rx="5" fill="white" opacity="0.25"/>
</svg>
