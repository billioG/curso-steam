<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear contraseña — Formación Docente</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Segoe UI', Arial, sans-serif;
    background:#0F172A;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
  }
  .card {
    background:white;
    border-radius:20px;
    max-width:420px;
    width:100%;
    padding:32px 28px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
  }
  .icon { text-align:center; margin-bottom:8px; font-size:32px; }
  h1 { font-size:19px; text-align:center; color:#0F172A; margin-bottom:4px; }
  .sub { font-size:12.5px; text-align:center; color:#94A3B8; margin-bottom:24px; }
  label { display:block; font-size:12.5px; font-weight:700; color:#334155; margin:14px 0 5px; }
  input[type=password] {
    width:100%; padding:11px 13px; border:1.5px solid #E2E8F0; border-radius:10px; font-size:13.5px; font-family:inherit;
  }
  button { width:100%; padding:13px; border:none; border-radius:10px; background:#07B0E4; color:white; font-weight:700; font-size:14px; cursor:pointer; margin-top:18px; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  .err { color:#DC2626; font-size:12px; margin-top:10px; text-align:center; min-height:16px; }
  .loader { text-align:center; color:#94A3B8; font-size:13px; padding:30px 0; }
  a.back { display:block; text-align:center; font-size:12.5px; color:#07B0E4; margin-top:16px; text-decoration:none; font-weight:700; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="loader">Verificando enlace...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://grkjhzkgcmackbafqudu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdya2poemtnY21hY2tiYWZxdWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjg5MzQsImV4cCI6MjA5NjcwNDkzNH0.2nVTRlhey6HkGs_KZxtCaEp8L2QrvD0NUwY8ZFwZVHY";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function renderInvalid() {
      document.getElementById('card').innerHTML = `
        <div class="icon">🔒</div>
        <h1>Enlace inválido o expirado</h1>
        <p class="sub">Este enlace de invitación ya no es válido. Pide al administrador que te reenvíe la invitación.</p>
        <a class="back" href="admin-login.html">Ir a iniciar sesión</a>`;
    }

    function renderSetPassword() {
      document.getElementById('card').innerHTML = `
        <div class="icon">🔑</div>
        <h1>Crea tu contraseña</h1>
        <p class="sub">Este será tu acceso para entrar de nuevo más adelante.</p>
        <form id="pwForm">
          <label for="pw1">Nueva contraseña</label>
          <input type="password" id="pw1" required minlength="6" autocomplete="new-password">
          <label for="pw2">Confirmar contraseña</label>
          <input type="password" id="pw2" required minlength="6" autocomplete="new-password">
          <button type="submit" id="submitBtn">Guardar y continuar</button>
          <p class="err" id="errMsg"></p>
        </form>`;

      document.getElementById('pwForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw1 = document.getElementById('pw1').value;
        const pw2 = document.getElementById('pw2').value;
        const errMsg = document.getElementById('errMsg');
        const submitBtn = document.getElementById('submitBtn');
        errMsg.textContent = '';

        if (pw1.length < 6) { errMsg.textContent = 'La contraseña debe tener al menos 6 caracteres.'; return; }
        if (pw1 !== pw2) { errMsg.textContent = 'Las contraseñas no coinciden.'; return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Guardando...';

        const { error: updErr } = await sb.auth.updateUser({ password: pw1 });
        if (updErr) {
          errMsg.textContent = 'No se pudo guardar la contraseña: ' + updErr.message;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Guardar y continuar';
          return;
        }

        await redirectByRole();
      });
    }

    // Decide a dónde mandar al usuario según su(s) fila(s) en user_roles:
    // - admin de un colegio (tenant_id != null) -> reclutamiento.html de ESE colegio
    // - super admin (tenant_id null, role admin) -> admin.html
    // - cualquier otro (student) -> index.html (plataforma de cursos)
    async function redirectByRole() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'admin-login.html'; return; }

      const { data: roleRows } = await sb.from('user_roles').select('role, tenant_id').eq('user_id', user.id);
      const rows = roleRows || [];

      const tenantAdminRow = rows.find(r => r.tenant_id !== null && r.role === 'admin');
      if (tenantAdminRow) {
        const { data: tenantRow } = await sb.from('tenants').select('slug').eq('id', tenantAdminRow.tenant_id).maybeSingle();
        if (tenantRow?.slug) {
          window.location.href = 'reclutamiento.html?tenant=' + encodeURIComponent(tenantRow.slug);
          return;
        }
      }

      const isSuperAdmin = rows.some(r => r.tenant_id === null && r.role === 'admin');
      window.location.href = isSuperAdmin ? 'admin.html' : 'index.html';
    }

    (async function init() {
      // Los links de invitación de Supabase llegan con los tokens en el
      // hash de la URL (#access_token=...&type=invite&...). supabase-js
      // los detecta y establece la sesión automáticamente al crear el
      // cliente (detectSessionInUrl, default true) — solo hay que esperar
      // a que termine ese procesamiento antes de pedir la sesión.
      const { data: { session } } = await sb.auth.getSession();

      if (session) {
        renderSetPassword();
        return;
      }

      // Flujo alterno (proyectos con PKCE): token_hash + type en query string.
      const params = new URLSearchParams(location.search);
      const token_hash = params.get('token_hash');
      const type = params.get('type');
      if (token_hash && type) {
        const { error } = await sb.auth.verifyOtp({ token_hash, type });
        if (!error) { renderSetPassword(); return; }
      }

      renderInvalid();
    })();
  </script>
</body>
</html>
